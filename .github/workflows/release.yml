name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/miare-ir/gitlab-ci-helper-runner

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest

      - name: Test
        run: ginkgo -r --randomize-all --randomize-suites --race ./...

  release-binaries:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archives
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          binary_name="gitlab-ci-helper"
          mkdir -p dist

          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for target in "${targets[@]}"; do
            goos="${target%%/*}"
            goarch="${target##*/}"
            ext=""
            if [ "${goos}" = "windows" ]; then
              ext=".exe"
            fi

            output="${binary_name}_${version}_${goos}_${goarch}${ext}"

            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags="-s -w" \
              -o "dist/${output}" \
              ./cmd/gitlab-ci-helper

            if [ "${goos}" = "windows" ]; then
              (
                cd dist
                zip "${binary_name}_${version}_${goos}_${goarch}.zip" "${output}"
              )
              rm -f "dist/${output}"
            else
              tar -C dist -czf "dist/${binary_name}_${version}_${goos}_${goarch}.tar.gz" "${output}"
              rm -f "dist/${output}"
            fi
          done

          (
            cd dist
            sha256sum * > checksums.txt
          )

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*

  publish-codex-base-image:
    needs: verify
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Codex npm version
        id: codex
        run: |
          set -euo pipefail

          version="$(tr -d '[:space:]' < docker/codex-base/CODEX_VERSION)"
          if [ -z "${version}" ]; then
            echo "docker/codex-base/CODEX_VERSION must not be empty" >&2
            exit 1
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      - name: Build and push Codex base image
        uses: docker/build-push-action@v6
        with:
          context: docker/codex-base
          file: docker/codex-base/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            CODEX_VERSION=${{ steps.codex.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
