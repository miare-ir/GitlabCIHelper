name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build CLI binary
        run: go build -o dist/gitlab-ci-helper ./cmd/gitlab-ci-helper

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitlab-ci-helper-linux-amd64
          path: dist/gitlab-ci-helper
          if-no-files-found: error
